<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gmail Leave Tracker</title>
  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      font-size: 14px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ── Header ───────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      padding: 16px 18px 28px;
      position: relative;
      overflow: hidden;
      color: #fff;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -20px; right: -20px;
      width: 80px; height: 80px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -12px; left: -12px;
      width: 50px; height: 50px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .header-row {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
    }
    .header-row svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .header-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
      position: relative;
      z-index: 1;
    }

    /* ── Count Card ───────────────────────────────── */
    .card-wrap {
      padding: 0 14px;
      margin-top: -18px;
      position: relative;
      z-index: 10;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(99,102,241,0.12), 0 1px 4px rgba(0,0,0,0.06);
      border: 1px solid #e8eaf0;
      padding: 18px 16px;
      text-align: center;
    }

    /* Loading state */
    .state { display: none; }
    .state.active { display: block; }

    .loading-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
    }
    .loading-inner svg {
      width: 28px;
      height: 28px;
      color: #6366f1;
      animation: spin 1s linear infinite;
    }
    .loading-inner p { font-size: 12px; color: #94a3b8; }

    /* Error state */
    .error-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
    }
    .error-icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #fef2f2;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error-icon-wrap svg { width: 18px; height: 18px; color: #ef4444; }
    #error-message { font-size: 12px; color: #dc2626; font-weight: 500; }
    .error-hint { font-size: 11px; color: #94a3b8; }

    /* Result state */
    .result-label {
      font-size: 10px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .count-wrap { animation: float 3s ease-in-out infinite; }
    #leave-count {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      letter-spacing: -2px;
    }
    #last-refreshed {
      font-size: 10px;
      color: #94a3b8;
      margin-top: 6px;
    }

    /* ── Buttons ──────────────────────────────────── */
    .actions {
      padding: 12px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.18s ease;
    }
    .btn svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }
    .btn-primary {
      background: #6366f1;
      color: #fff;
      box-shadow: 0 2px 8px rgba(99,102,241,0.35);
    }
    .btn-primary:hover { background: #4f46e5; box-shadow: 0 4px 14px rgba(99,102,241,0.45); }
    .btn-primary:active { background: #4338ca; }
    .btn-primary:disabled { opacity: 0.65; cursor: not-allowed; }

    .btn-secondary {
      background: #fff;
      color: #475569;
      border: 1px solid #e2e8f0;
    }
    .btn-secondary:hover { background: #f8fafc; border-color: #cbd5e1; }
    .btn-secondary:active { background: #f1f5f9; }

    /* ── Animations ───────────────────────────────── */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-3px); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.04); }
    }
    .spin { animation: spin 1s linear infinite; }
    .count-animate { animation: pulse 0.5s ease-in-out; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-row">
      <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      <span class="header-title">Gmail Leave Tracker</span>
    </div>
    <p class="header-sub">Track your leave days automatically</p>
  </div>

  <!-- Count Card -->
  <div class="card-wrap">
    <div class="card">

      <!-- Loading -->
      <div id="loading-state" class="state">
        <div class="loading-inner">
          <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          <p>Scanning your emails…</p>
        </div>
      </div>

      <!-- Error -->
      <div id="error-state" class="state">
        <div class="error-inner">
          <div class="error-icon-wrap">
            <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
            </svg>
          </div>
          <p id="error-message"></p>
          <p class="error-hint">Try refreshing or check your settings</p>
        </div>
      </div>

      <!-- Result -->
      <div id="result-state" class="state active">
        <p class="result-label">Days Taken This Year</p>
        <div class="count-wrap">
          <p id="leave-count">—</p>
        </div>
        <p id="last-refreshed">Not yet refreshed</p>
      </div>

    </div>
  </div>

  <!-- Action Buttons -->
  <div class="actions">
    <button id="refresh-btn" class="btn btn-primary">
      <svg id="refresh-icon" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Refresh Now
    </button>
    <button id="options-btn" class="btn btn-secondary">
      <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Configure Keywords &amp; Senders
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
